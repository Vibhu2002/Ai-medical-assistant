<!DOCTYPE html>
<html><head><title>Prediction Result</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="container py-5"><h2>Prediction Result</h2><div id="result" class="alert alert-info"></div><a href="disease-info.html" class="btn btn-outline-primary">Disease Info</a></body>
<script>
const data = JSON.parse(sessionStorage.getItem('prediction') || '{}');
result.innerHTML = `<strong>Disease:</strong> ${data.predictedDisease || 'N/A'}<br><strong>Confidence:</strong> ${data.confidenceScore || 'N/A'}<br><strong>Advice:</strong> ${data.recommendation || ''}`;
</script></html>
