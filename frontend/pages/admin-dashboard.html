<!DOCTYPE html>
<html><head><title>Admin Dashboard</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><script src="../js/api.js"></script></head>
<body class="container py-5"><h2>Admin Dashboard</h2>
<div class="row g-3">
<div class="col-md-6"><div class="card p-3"><h5>Add Disease</h5><input id="dName" class="form-control mb-2" placeholder="Disease name"><textarea id="dDesc" class="form-control mb-2" placeholder="Description"></textarea><textarea id="dPrec" class="form-control mb-2" placeholder="Precautions"></textarea><button class="btn btn-primary" id="addDisease">Add Disease</button></div></div>
<div class="col-md-6"><div class="card p-3"><h5>Add Symptom</h5><input id="sName" class="form-control mb-2" placeholder="Symptom name"><input id="sDesc" class="form-control mb-2" placeholder="Description"><button class="btn btn-success" id="addSymptom">Add Symptom</button></div></div>
</div>
<script>
addDisease.onclick=async()=>{try{await apiCall('/admin/diseases','POST',{name:dName.value,description:dDesc.value,precautions:dPrec.value,severity:'MEDIUM'});alert('Disease added');}catch(e){alert(e.message)}};
addSymptom.onclick=async()=>{try{await apiCall('/admin/symptoms','POST',{name:sName.value,description:sDesc.value});alert('Symptom added');}catch(e){alert(e.message)}};
</script>
</body></html>
