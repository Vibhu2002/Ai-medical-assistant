<!DOCTYPE html>
<html><head><title>Login</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><script src="../js/api.js"></script></head>
<body class="container py-5"><h2>Login</h2><form id="loginForm" class="col-md-5"><input class="form-control mb-2" id="email" placeholder="Email" required><input class="form-control mb-2" id="password" type="password" placeholder="Password" required><button class="btn btn-primary">Login</button></form>
<script>
document.getElementById('loginForm').addEventListener('submit', async e => {e.preventDefault(); try { const data = await apiCall('/auth/login','POST',{email:email.value,password:password.value}); setToken(data.token); location.href='symptom-checker.html'; } catch(err){alert(err.message);} });
</script></body></html>
