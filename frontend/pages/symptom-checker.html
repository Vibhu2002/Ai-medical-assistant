<!DOCTYPE html>
<html><head><title>Symptom Checker</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><script src="../js/api.js"></script></head>
<body class="container py-5"><h2>Symptom Checker</h2><p>Enter symptoms separated by commas.</p><textarea id="symptoms" class="form-control mb-3" rows="4" placeholder="fever,cough,fatigue"></textarea><button class="btn btn-primary" id="predictBtn">Predict</button>
<script>
predictBtn.addEventListener('click', async ()=>{ try{ const symptomsList=symptoms.value.split(',').map(s=>s.trim()).filter(Boolean); const res = await apiCall('/predict','POST',{symptoms:symptomsList}); sessionStorage.setItem('prediction', JSON.stringify(res)); location.href='prediction-result.html'; } catch(e){alert(e.message);} });
</script></body></html>
